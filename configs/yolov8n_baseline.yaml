# Shared baseline hyperparameters for YOLOv8n
model: yolov8n.pt
data: data/dataset.yaml
epochs: 50
baseline_epochs: 50
amp_epochs: 20
qat_epochs: 8
imgsz: 512
batch: 12
optimizer: AdamW
lr0: 0.0005
baseline_lr0: 0.0005
amp_lr0: 0.00025
qat_lr0: 0.0001
lrf: 0.005
warmup_epochs: 2
weight_decay: 0.0005
amp: false
mosaic: 0.5
mixup: 0.0
hsv_h: 0.01
hsv_s: 0.5
hsv_v: 0.3
degrees: 3.0
translate: 0.08
scale: 0.35
close_mosaic: 8
patience: 15
fraction: 0.5
workers: 4
