# Shared baseline hyperparameters for YOLOv8n
model: yolov8n.pt
data: data/dataset.yaml
epochs: 150
baseline_epochs: 150
amp_epochs: 100
qat_epochs: 30
imgsz: 640
batch: 16
optimizer: AdamW
lr0: 0.0005
baseline_lr0: 0.0005
amp_lr0: 0.00025
qat_lr0: 0.0001
lrf: 0.005
warmup_epochs: 5
weight_decay: 0.0005
amp: false
mosaic: 0.7
mixup: 0.05
hsv_h: 0.01
hsv_s: 0.5
hsv_v: 0.3
degrees: 3.0
translate: 0.08
scale: 0.35
close_mosaic: 20
patience: 40
